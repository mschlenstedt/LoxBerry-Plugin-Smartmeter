name: Release asset

on:
  push:
    tags:
      - "Smartmeter-V*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example Smartmeter-V2.0.0.21"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-asset:
    name: Build and upload plugin ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Determine release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            Smartmeter-V*) ;;
            *)
              echo "Unsupported tag format: $tag" >&2
              exit 1
              ;;
          esac

          version="${tag#Smartmeter-V}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Build plugin ZIP
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          prefix="LoxBerry-Plugin-Smartmeter-v2-$tag/"
          zip="dist/Smartmeter-V$version.zip"

          mkdir -p dist
          git archive --format=zip --worktree-attributes --prefix="$prefix" -o "$zip" "$tag"

          unzip -t "$zip"
          unzip -p "$zip" "${prefix}plugin.cfg" | tr -d '\r' | grep -Fx "VERSION=$version"

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          notes="dist/release-notes.md"

          awk -v version="$version" '
            index($0, "## " version) == 1 { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > "$notes"

          if ! grep -q '[^[:space:]]' "$notes"; then
            printf 'Smartmeter V%s\n' "$version" > "$notes"
          fi

      - name: Create release with plugin ZIP
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          version="${{ steps.release.outputs.version }}"
          zip="dist/Smartmeter-V$version.zip"
          notes="dist/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists. Refusing to modify an existing release." >&2
            exit 1
          fi

          gh release create "$tag" "$zip" \
            --draft \
            --prerelease \
            --verify-tag \
            --title "Smartmeter V$version" \
            --notes-file "$notes"

          gh release edit "$tag" --draft=false --prerelease
