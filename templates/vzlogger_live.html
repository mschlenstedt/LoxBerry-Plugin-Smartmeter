<!doctype html>
<html lang="<TMPL_VAR NAME=COMMON.LANGUAGE_CODE ESCAPE=HTML>">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title><TMPL_VAR NAME=VZLOGGER.LIVE_TITLE></title>
<style>
:root{color-scheme:light;--border:#c8cdd2;--muted:#5f6872;--head:#eef1f3;--channel:#f7f8f9;--error:#a32020}
*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;color:#202428;background:#fff}main{width:min(1100px,100%);margin:0 auto;padding:1.25rem}h1{font-size:1.55rem;margin:0 0 .35rem;letter-spacing:0}h2{font-size:1.15rem;margin:1.6rem 0 .55rem;padding-bottom:.4rem;border-bottom:2px solid #454b50;letter-spacing:0}.serial{display:block;margin-top:.2rem;color:var(--muted);font-size:.82rem;font-weight:normal}.status{min-height:1.4rem;margin-bottom:1rem;color:var(--muted);font-size:.9rem}.error{color:var(--error)}.table-wrap{overflow-x:auto}table{border-collapse:collapse;width:100%;table-layout:fixed}th,td{border:1px solid var(--border);padding:.48rem .6rem;text-align:left;vertical-align:top;overflow-wrap:anywhere}thead th{background:var(--head);font-size:.85rem}.channel-heading th{background:var(--channel);padding:.62rem}.channel-title{font-size:.98rem;font-weight:700}.channel-meta{display:block;margin-top:.18rem;color:var(--muted);font-size:.78rem;font-weight:normal}.time{width:48%}.raw-time{color:var(--muted);font-variant-numeric:tabular-nums}.value{font-variant-numeric:tabular-nums}.empty{padding:.8rem;border:1px solid var(--border);color:var(--muted)}
@media(max-width:620px){main{padding:.85rem}h1{font-size:1.3rem}.time{width:58%}th,td{padding:.42rem;font-size:.86rem}}
</style>
</head>
<body>
<div id="i18n" hidden
 data-locale="<TMPL_VAR NAME=COMMON.LANGUAGE_CODE ESCAPE=HTML>"
 data-unnamed="<TMPL_VAR NAME=VZLOGGER.LIVE_UNNAMED_CHANNEL ESCAPE=HTML>"
 data-invalid-time="<TMPL_VAR NAME=VZLOGGER.LIVE_INVALID_TIME ESCAPE=HTML>"
 data-raw-value="<TMPL_VAR NAME=VZLOGGER.LIVE_RAW_VALUE ESCAPE=HTML>"
 data-metadata-failed="<TMPL_VAR NAME=VZLOGGER.LIVE_METADATA_FAILED ESCAPE=HTML>"
 data-data-failed="<TMPL_VAR NAME=VZLOGGER.LIVE_DATA_FAILED ESCAPE=HTML>"
 data-no-channels="<TMPL_VAR NAME=VZLOGGER.LIVE_NO_CHANNELS ESCAPE=HTML>"
 data-reading-head="<TMPL_VAR NAME=VZLOGGER.LIVE_READING_HEAD ESCAPE=HTML>"
 data-timestamp="<TMPL_VAR NAME=VZLOGGER.LIVE_TIMESTAMP ESCAPE=HTML>"
 data-value="<TMPL_VAR NAME=VZLOGGER.LIVE_VALUE ESCAPE=HTML>"
 data-channel="<TMPL_VAR NAME=VZLOGGER.LIVE_CHANNEL ESCAPE=HTML>"
 data-no-reading="<TMPL_VAR NAME=VZLOGGER.LIVE_NO_READING ESCAPE=HTML>"
 data-last-update="<TMPL_VAR NAME=VZLOGGER.LIVE_LAST_UPDATE ESCAPE=HTML>"></div>
<main><h1><TMPL_VAR NAME=VZLOGGER.LIVE_TITLE></h1><div id="status" class="status"><TMPL_VAR NAME=VZLOGGER.LIVE_LOADING></div><div id="state"></div></main>
<script>
const i18n=document.getElementById('i18n').dataset;
const locale=i18n.locale==='de'?'de-DE':'en-US';
const languageQuery='&lang='+encodeURIComponent(i18n.locale);
let metadataVersion='';let metadata={channels:{}};
function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function readableName(value){return String(value||i18n.unnamed).replace(/_/g,' ');}
function displayValue(value,meta){const numeric=Number(value);const factor=Number(meta.display_factor??1);const unit=String(meta.unit||'');if(!Number.isFinite(numeric)||!Number.isFinite(factor))return esc(value)+(unit?' '+esc(unit):'');const scaled=numeric*factor;const formatted=new Intl.NumberFormat(locale,{maximumFractionDigits:6,useGrouping:false}).format(scaled);const title=factor!==1?' title="'+esc(i18n.rawValue)+': '+esc(value)+'"':'';return '<span'+title+'>'+esc(formatted)+(unit?' '+esc(unit):'')+'</span>';}
function channelUuid(channel){return String(channel.uuid||channel.id||'').toLowerCase();}
function channelNumber(meta,index){return Number.isInteger(meta.channel_index)?meta.channel_index:index;}
function timestampText(value){const numeric=Number(value);if(!Number.isFinite(numeric))return esc(value);const milliseconds=Math.abs(numeric)<100000000000?numeric*1000:numeric;const date=new Date(milliseconds);const readable=Number.isNaN(date.getTime())?i18n.invalidTime:date.toLocaleString(locale,{dateStyle:'medium',timeStyle:'medium'});return '<span class="raw-time">'+esc(value)+'</span> ('+esc(readable)+')';}
async function loadMetadata(){const response=await fetch('?meta=1'+languageQuery,{cache:'no-store'});if(!response.ok)throw new Error(i18n.metadataFailed);metadata=await response.json();metadata.channels=metadata.channels||{};metadataVersion=String(metadata.version||'');}
function render(data){if(data&&data.error)throw new Error(data.error);const channels=Array.isArray(data&&data.data)?data.data:(Array.isArray(data)?data:[]);if(!channels.length){document.getElementById('state').innerHTML='<div class="empty">'+esc(i18n.noChannels)+'</div>';return;}const groups=new Map();channels.forEach((channel,index)=>{const uuid=channelUuid(channel);const meta=metadata.channels[uuid]||{};const serial=meta.serial||'unknown';if(!groups.has(serial))groups.set(serial,{name:meta.head_name||serial,serial,channels:[]});groups.get(serial).channels.push({channel,meta,index,uuid});});const output=[];groups.forEach(group=>{output.push('<section><h2>'+esc(group.name)+'<span class="serial">'+esc(i18n.readingHead)+': '+esc(group.serial)+'</span></h2>');output.push('<div class="table-wrap"><table><thead><tr><th class="time">'+esc(i18n.timestamp)+'</th><th>'+esc(i18n.value)+'</th></tr></thead><tbody>');group.channels.sort((a,b)=>channelNumber(a.meta,a.index)-channelNumber(b.meta,b.index)).forEach(item=>{const number=channelNumber(item.meta,item.index);const identifier=item.meta.identifier||item.channel.identifier||'';const catalog=i18n.locale==='de'?item.meta.catalog_name_de:item.meta.catalog_name_en;const name=item.meta.display_name||catalog||readableName(item.meta.name||identifier||item.uuid);output.push('<tr class="channel-heading"><th colspan="2"><span class="channel-title">'+esc(i18n.channel)+' '+esc(number)+' - '+esc(name)+'</span><span class="channel-meta">OBIS: '+esc(identifier||'-')+' | UUID: '+esc(item.uuid||'-')+'</span></th></tr>');const tuples=Array.isArray(item.channel.tuples)?item.channel.tuples:[];if(!tuples.length){output.push('<tr><td colspan="2" class="empty">'+esc(i18n.noReading)+'</td></tr>');return;}tuples.forEach(tuple=>{const timestamp=Array.isArray(tuple)?tuple[0]:'';const value=Array.isArray(tuple)?tuple[1]:tuple;output.push('<tr><td>'+timestampText(timestamp)+'</td><td class="value">'+displayValue(value,item.meta)+'</td></tr>');});});output.push('</tbody></table></div></section>');});output.push('<p class="status">vzLogger '+esc(data.version||'')+(data.generator?' | '+esc(data.generator):'')+'</p>');document.getElementById('state').innerHTML=output.join('');}
async function refresh(){try{const response=await fetch('?json=1'+languageQuery,{cache:'no-store'});if(!response.ok)throw new Error(i18n.dataFailed);const currentVersion=response.headers.get('X-Smartmeter-Metadata-Version')||'';if(currentVersion&&currentVersion!==metadataVersion)await loadMetadata();render(await response.json());document.getElementById('status').className='status';document.getElementById('status').textContent=i18n.lastUpdate+': '+new Date().toLocaleString(locale);}catch(error){document.getElementById('status').className='status error';document.getElementById('status').textContent=error.message;}}
(async()=>{try{await loadMetadata();await refresh();}catch(error){document.getElementById('status').className='status error';document.getElementById('status').textContent=error.message;}setInterval(refresh,2000);})();
</script></body></html>
