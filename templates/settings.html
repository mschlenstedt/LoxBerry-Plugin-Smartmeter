			<button type="submit" name="submitaction" value="debug-log" title="<TMPL_VAR NAME=T::VZLOGGER.CREATE_DEBUG_LOG_HELP>" form="vzlogger_form" formtarget="_blank" data-role="button" data-inline="true" data-mini="true" data-icon="search"><TMPL_VAR NAME=T::VZLOGGER.CREATE_DEBUG_LOG></button>
			<button type="submit" name="submitaction" value="apply" title="<TMPL_VAR NAME=T::VZLOGGER.SAVE_APPLY_HELP>" form="vzlogger_form" data-role="button" data-inline="true" data-mini="true" data-icon="gear"><TMPL_VAR NAME=T::VZLOGGER.SAVE_APPLY></button>
		</td>
		<td>&nbsp;</td>
		<td><font size="-1"><TMPL_VAR NAME=T::VZLOGGER.VALIDATE_CONFIG_HELP><br><br><TMPL_VAR NAME=T::VZLOGGER.CREATE_DEBUG_LOG_HELP><br><br><TMPL_VAR NAME=T::VZLOGGER.SAVE_APPLY_HELP></font></td>
	</tr>
	</table>
	</form>
	<div id="obis_search_overlay" class="obis-search-overlay" role="dialog" aria-modal="true" aria-labelledby="obis_search_title" aria-describedby="obis_search_message" aria-hidden="true" tabindex="-1">
		<div class="obis-search-dialog">
			<div class="obis-search-spinner" aria-hidden="true"></div>
			<div id="obis_search_title" class="obis-search-title"><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_RUNNING></div>
			<div id="obis_search_message" class="obis-search-message" role="status" aria-live="polite"><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_WAIT></div>
			<div class="obis-search-actions"><button id="obis_search_cancel" type="button" data-role="button" data-inline="true" data-mini="true" data-icon="delete" onclick="cancel_obis_discovery();"><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_CANCEL></button></div>
			<span id="obis_search_running_text" hidden><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_RUNNING></span>
			<span id="obis_search_wait_text" hidden><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_WAIT></span>
			<span id="obis_search_cancelling_text" hidden><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_CANCELLING></span>
			<span id="obis_search_failed_text" hidden><TMPL_VAR NAME=T::VZLOGGER.OBIS_SEARCH_FAILED></span>
		</div>
	</div>

	<script>
		var obis_job_id = "";
		var obis_job_serial = "";
		var obis_poll_timer = null;
		var obis_poll_failures = 0;

		function obis_text(id) {
			var element = document.getElementById(id);
			return element ? element.textContent : "";
		}

		function show_obis_search_overlay() {
			var overlay = document.getElementById("obis_search_overlay");
			if (!overlay) return;
			document.querySelector(".obis-search-spinner").style.display = "block";
			document.getElementById("obis_search_title").textContent = obis_text("obis_search_running_text");
			document.getElementById("obis_search_message").textContent = obis_text("obis_search_wait_text");
			document.getElementById("obis_search_cancel").disabled = false;
			overlay.classList.add("is-visible");
			overlay.setAttribute("aria-hidden", "false");
			document.getElementById("vzlogger_form").setAttribute("aria-busy", "true");
			overlay.focus();
		}

		function reset_obis_search_overlay() {
			if (obis_poll_timer) window.clearTimeout(obis_poll_timer);
			obis_poll_timer = null;
			var overlay = document.getElementById("obis_search_overlay");
			if (overlay) {
				overlay.classList.remove("is-visible");
				overlay.setAttribute("aria-hidden", "true");
			}
			var form = document.getElementById("vzlogger_form");
			if (form) form.removeAttribute("aria-busy");
			obis_job_id = "";
			obis_job_serial = "";
			obis_poll_failures = 0;
		}

		function obis_ajax_url(action) {
			return "./index.cgi?ajax=1&ajaxaction=" + encodeURIComponent(action) + "&_=" + Date.now();
		}

		function start_obis_discovery(serial) {
			var form = document.getElementById("vzlogger_form");
			if (!form || (form.reportValidity && !form.reportValidity())) return;
			document.getElementById("obis_serial").value = serial;
			obis_job_serial = serial;
			show_obis_search_overlay();
			var data = new FormData(form);
			data.append("ajax", "1");
			data.append("ajaxaction", "obis-start");
			fetch("./index.cgi", { method: "POST", body: data, credentials: "same-origin", cache: "no-store" })
				.then(function (response) { return response.json(); })
				.then(function (status) {
					if (!status.ok || !status.job_id) throw new Error(status.message || obis_text("obis_search_failed_text"));
					obis_job_id = status.job_id;
					obis_job_serial = status.serial || serial;
					poll_obis_discovery();
				})
				.catch(obis_discovery_failed);
		}

		function poll_obis_discovery() {
			fetch(obis_ajax_url("obis-status"), { credentials: "same-origin", cache: "no-store" })
				.then(function (response) { return response.json(); })
				.then(function (status) {
					obis_poll_failures = 0;
					if (status.state == "completed") {
						var serial = status.serial || obis_job_serial;
						window.location.href = "./index.cgi?form=vzlogger&obis_serial=" + encodeURIComponent(serial);
						return;
					}
					if (status.state == "cancelled") {
						reset_obis_search_overlay();
						return;
					}
					if (status.state == "failed") {
						throw new Error(status.message || obis_text("obis_search_failed_text"));
					}
					if (status.state == "cancelling") {
						document.getElementById("obis_search_message").textContent = obis_text("obis_search_cancelling_text");
						document.getElementById("obis_search_cancel").disabled = true;
					}
					obis_job_id = status.job_id || obis_job_id;
					obis_job_serial = status.serial || obis_job_serial;
					obis_poll_timer = window.setTimeout(poll_obis_discovery, 1000);
				})
				.catch(function (error) {
					obis_poll_failures++;
					if (obis_poll_failures < 3) {
						obis_poll_timer = window.setTimeout(poll_obis_discovery, 1000);
						return;
					}
					obis_discovery_failed(error);
				});
		}

		function cancel_obis_discovery() {
			if (!obis_job_id) return;
			document.getElementById("obis_search_message").textContent = obis_text("obis_search_cancelling_text");
			document.getElementById("obis_search_cancel").disabled = true;
			var data = new FormData();
			data.append("ajax", "1");
			data.append("ajaxaction", "obis-cancel");
			data.append("job_id", obis_job_id);
			fetch("./index.cgi", { method: "POST", body: data, credentials: "same-origin", cache: "no-store" })
				.then(function (response) { return response.json(); })
				.then(function (status) {
					if (!status.ok) throw new Error(status.message || obis_text("obis_search_failed_text"));
					if (!obis_poll_timer) poll_obis_discovery();
				})
				.catch(obis_discovery_failed);
		}

		function obis_discovery_failed(error) {
			var message = error && error.message ? error.message : obis_text("obis_search_failed_text");
			reset_obis_search_overlay();
			window.alert(obis_text("obis_search_failed_text") + "\n\n" + message);
		}

		function resume_obis_discovery() {
			fetch(obis_ajax_url("obis-status"), { credentials: "same-origin", cache: "no-store" })
				.then(function (response) { return response.json(); })
				.then(function (status) {
					if (["starting", "running", "cancelling"].indexOf(status.state) < 0) return;
					obis_job_id = status.job_id || "";
					obis_job_serial = status.serial || "";
					show_obis_search_overlay();
					if (status.state == "cancelling") {
						document.getElementById("obis_search_message").textContent = obis_text("obis_search_cancelling_text");
						document.getElementById("obis_search_cancel").disabled = true;
					}
					obis_poll_timer = window.setTimeout(poll_obis_discovery, 1000);
				});
		}

		window.addEventListener("pageshow", function () {
			reset_obis_search_overlay();
			resume_obis_discovery();
		});

		$("#read").val("<TMPL_VAR READ>");
		$("#implementation").val("<TMPL_VAR IMPLEMENTATION>");
		$("#sendudp").val("<TMPL_VAR SENDUDP>");
		$("#vzlogger_debug").val("<TMPL_VAR VZLOGGER_DEBUG>");
		$("#vzlogger_service_debug").val("<TMPL_VAR VZLOGGER_SERVICE_DEBUG>");
		$("#vzlogger_loglevel").val("<TMPL_VAR VZLOGGER_LOGLEVEL>");
		$("#vzlogger_localenabled").val("<TMPL_VAR VZLOGGER_LOCALENABLED>");
		$("#vzlogger_localindex").val("<TMPL_VAR VZLOGGER_LOCALINDEX>");
		$("#vzlogger_mqttenabled").val("<TMPL_VAR VZLOGGER_MQTTENABLED>");
		$("#vzlogger_mqttretain").val("<TMPL_VAR VZLOGGER_MQTTRETAIN>");
		$("#vzlogger_mqttrawandagg").val("<TMPL_VAR VZLOGGER_MQTTRAWANDAGG>");
		$("#vzlogger_mqttqos").val("<TMPL_VAR VZLOGGER_MQTTQOS>");
		$("#vzlogger_mqtttimestamp").val("<TMPL_VAR VZLOGGER_MQTTTIMESTAMP>");
		$("#vzlogger_udpinterval").val("<TMPL_VAR VZLOGGER_UDPINTERVAL>");
		disable_cron();
		disable_udp();

		function disable_cron() {
			update_vzlogger_controls();
		}

		function set_control_disabled(selector, disabled) {
			var controls = $(selector);
			controls.prop("disabled", disabled).toggleClass("ui-disabled", disabled);
			controls.each(function() {
				$(this).closest(".ui-input-text, .ui-select, .ui-flipswitch, .ui-checkbox").toggleClass("ui-disabled", disabled);
			});
		}

		function update_vzlogger_controls() {
			var vzlogger_disabled = $("#implementation").val() != "vzlogger";
			set_control_disabled("#vzlogger_localenabled, #vzlogger_localport, #vzlogger_localindex, #vzlogger_localtimeout, #vzlogger_localbuffer, #vzlogger_service_debug, #vzlogger_loglevel, #vzlogger_retry, #vzlogger_mqttenabled", vzlogger_disabled);
			update_mqtt_controls();
		}

		function update_mqtt_controls() {
			var mqtt_disabled = $("#implementation").val() != "vzlogger" || $("#vzlogger_mqttenabled").val() == "0";
			set_control_disabled("#vzlogger_mqtthost, #vzlogger_mqttport, #vzlogger_mqttcafile, #vzlogger_mqttcapath, #vzlogger_mqttcertfile, #vzlogger_mqttkeyfile, #vzlogger_mqttkeypass, #vzlogger_mqttkeypass_reset, #vzlogger_mqttkeepalive, #mqtttopic, #vzlogger_mqttid, #vzlogger_mqttuser, #vzlogger_mqttpass, #vzlogger_mqttpass_reset, #vzlogger_mqttretain, #vzlogger_mqttrawandagg, #vzlogger_mqttqos, #vzlogger_mqtttimestamp", mqtt_disabled);
			update_bridge_controls();
		}

		function update_bridge_controls() {
			var bridge_available = $("#implementation").val() == "vzlogger" && $("#vzlogger_mqttenabled").val() == "1";
			var bridge_disabled = !bridge_available || $("#read").val() == "0";
			set_control_disabled("#read", !bridge_available);
			set_control_disabled(".bridge-service-control, #vzlogger_udpinterval, #sendudp, #vzlogger_debug", bridge_disabled);
			disable_udp();
		}

		function disable_udp() {
			var udp_disabled = $("#implementation").val() != "vzlogger" || $("#vzlogger_mqttenabled").val() == "0" || $("#read").val() == "0" || $("#sendudp").val() == "0";
			set_control_disabled("#udpport", udp_disabled);
			$("#labeludpport").toggleClass("ui-disabled", udp_disabled);
		}

		function update_meter_protocol(serial) {
			var panelElement = document.getElementById("meter_" + serial);
			var selectElement = document.getElementById(serial + "_meter");
			if (!panelElement || !selectElement) return;
			var panel = $(panelElement);
			var mode = selectElement.value;
			panel.find(".meter-field").each(function () {
				var protocols = (this.getAttribute("data-protocols") || "").split(/\s+/);
				$(this).toggle(protocols.indexOf(mode) >= 0);
			});
			var fieldOrder = {
				sml: ["interval", "pullseq", "baudrate", "parity", "use_local_time"],
				d0: ["interval", "dump_file", "pullseq", "ackseq", "baudrate", "baudrate_read", "parity", "wait_sync", "read_timeout", "baudrate_change_delay"],
				oms: ["baudrate", "key", "mbus_debug", "use_local_time"]
			};
			var userAnchor = panel.find(".meter-user-settings").first();
			(fieldOrder[mode] || []).forEach(function (field) {
				userAnchor.before(panel.find('.meter-field[data-meter-field="' + field + '"]'));
			});
			panel.find(".meter-user-settings").toggle(mode == "user");
			panel.find(".meter-common-field").toggle(["sml", "d0", "oms"].indexOf(mode) >= 0);
			panel.find(".meter-obis-settings").toggle(["sml", "d0", "oms"].indexOf(mode) >= 0);
			var omsUnsupported = mode == "oms" && panel.attr("data-oms-supported") != "1";
			set_control_disabled(panel.find(".obis-discovery"), omsUnsupported);
			panel.find(".meter-oms-runtime-warning").toggle(omsUnsupported);
			var selectedOption = selectElement.options[selectElement.selectedIndex];
			panel.find(".meter-protocol-summary").text(selectedOption ? selectedOption.text : "");
			var warningKind = panel.attr("data-warning-kind") || "";
			var showWarning = !warningKind || warningKind == mode;
			panel.find(".meter-warning-icon, .meter-primary-warning").toggle(showWarning);
		}

		$(".meter-panel").each(function () {
			var serial = this.id.substring("meter_".length);
			document.getElementById(serial + "_meter").value = this.getAttribute("data-current-mode") || "0";
			document.getElementById(serial + "_enabled").value = this.getAttribute("data-meter-enabled") || "1";
			document.getElementById(serial + "_allowskip").value = this.getAttribute("data-allowskip") || "1";
			document.getElementById(serial + "_paritymode").value = this.getAttribute("data-parity") || "8n1";
			document.getElementById(serial + "_uselocaltime").value = this.getAttribute("data-local-time") || "0";
			document.getElementById(serial + "_waitsync").value = this.getAttribute("data-wait-sync") || "off";
			document.getElementById(serial + "_mbusdebug").value = this.getAttribute("data-mbus-debug") || "0";
			update_meter_protocol(serial);
		});
	</script>
</TMPL_IF>
