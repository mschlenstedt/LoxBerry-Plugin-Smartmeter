<script>
	// Error messages
	var $messages = $('#form-error-message');
	$.validate({
		modules : 'security',
		scrollToTopOnError : true,
		errorMessagePosition : $messages,
	});

	var saved_implementation = "<TMPL_VAR NAME=IMPLEMENTATION>";
	var initial_implementation_value = "<TMPL_VAR NAME=IMPLEMENTATION_SWITCH_VALUE>";
	$("#implementation").val(initial_implementation_value);
	update_legacy_activation_state();

	// Disable some options on Load depending on selected value
	disable_cron();
	disable_udp();
	disable_mqtt();

	function set_implementation_tab_state(id, active) {
		var state = $("#" + id);
		if (!state.length) return;
		var label = state.attr(active ? "data-active-label" : "data-inactive-label") || "";
		state.toggleClass("is-active", active).toggleClass("is-inactive", !active).attr("title", label).attr("aria-label", label);
		state.find(".implementation-state-icon").text(active ? "✓" : "–");
	}

	function set_implementation_tab_states(mode) {
		set_implementation_tab_state("vzlogger_tab_state", mode == "vzlogger");
		set_implementation_tab_state("legacy_tab_state", mode == "legacy");
	}

	function update_legacy_activation_state() {
		var changed = $("#implementation").val() != initial_implementation_value;
		$("#implementation_changed").val(changed ? "1" : "0");
		$("#implementation_unsaved").prop("hidden", !changed);
		set_implementation_tab_states(saved_implementation);
	}

	function disable_cron() {
		if ( $( "#read" ).val() == "0" ) {
			$( "#cron" ).addClass('ui-disabled');
			$( "#cron" ).selectmenu();
			$( "#cron" ).selectmenu('refresh', true);
		}
		if ( $( "#read" ).val() == "1" ) {
			$( "#cron" ).removeClass('ui-disabled');
			$( "#cron" ).selectmenu();
			$( "#cron" ).selectmenu('refresh', true);
		}
	}

	function disable_udp() {
		if ( $( "#sendudp" ).val() == "0" ) {
			$( "#udpport" ).addClass('ui-disabled');
			$( "#labeludpport" ).addClass('ui-disabled');
		}
		if ( $( "#sendudp" ).val() == "1" ) {
			$( "#udpport" ).removeClass('ui-disabled');
			$( "#labeludpport" ).removeClass('ui-disabled');
		}
	}

	function disable_mqtt() {
		if ( $( "#sendmqtt" ).val() == "0" ) {
			$( "#mqtttopic" ).addClass('ui-disabled');
			$( "#labelmqtttopic" ).addClass('ui-disabled');
		}
		if ( $( "#sendmqtt" ).val() == "1" ) {
			$( "#mqtttopic" ).removeClass('ui-disabled');
			$( "#labelmqtttopic" ).removeClass('ui-disabled');
		}
	}
</script>
